name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test:run

      - name: Build
        run: npm run build

      - name: Verify Enterprise Readiness
        run: npm run verify:readiness

      - name: Install API dependencies
        run: npm ci
        working-directory: apps/api

      - name: Build API
        run: npm run build
        working-directory: apps/api

      - name: Test API
        run: npm run test
        working-directory: apps/api
